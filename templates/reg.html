{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
  


<div class="container text-dark mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card p-4 shadow">

            <h3 class="text-center  mb-4">Register</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                
                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Register
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock content %}
