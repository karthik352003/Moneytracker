{% extends "base.html" %}
{% block content %}
<div class="container mt-5">

    <h2 class="mb-4">Financial Summary</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body">
                    <h5>Total Income</h5>
                    <h3>₹ {{ income }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-danger shadow">
                <div class="card-body">
                    <h5>Total Expense</h5>
                    <h3>₹ {{ expense }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-primary shadow">
                <div class="card-body">
                    <h5>Balance</h5>
                    <h3>₹ {{ balance }}</h3>
                </div>
            </div>
        </div>

    </div>
<a href="{% url 'transaction_list' %}" class="btn btn-dark mt-4">Back</a>
</div>
 

  
{% endblock content %}
