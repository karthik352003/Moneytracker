{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container text-dark mt-5">
    <div class="col-md-5 offset-md-4">
        <div class="card p-4 shadow">

            <h3 class="text-center mb-4">Login</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit" class="btn btn-success w-100 mt-3">
                    Login
                </button>
            </form>

        </div>
    </div>
</div>
  
{% endblock content %}
